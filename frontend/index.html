<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA essentials -->
    <meta name="theme-color" content="#1565c0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyBus" />

    <!-- SEO / share -->
    <meta name="description" content="Real-time college bus tracking — live location, ETA, route timeline" />
    <meta name="application-name" content="Where Is My Bus" />

    <!-- Open Graph (WhatsApp / social share preview) -->
    <meta property="og:title" content="Where Is My Bus 🚌" />
    <meta property="og:description" content="Track your college bus live. Know exactly where it is, right now." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Mobile CSS overrides -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body, #root { overflow-x: hidden; max-width: 100vw; }
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

      /* Prevent iOS input zoom — font-size must be >= 16px */
      input, select, textarea { font-size: 16px !important; }

      /* Admin 2-col → 1-col on mobile */
      .admin-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 640px) { .admin-2col { grid-template-columns: 1fr !important; } }

      /* Admin bus number grid */
      .bus-num-grid-admin { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-top: 6px; }
      @media (max-width: 360px) { .bus-num-grid-admin { grid-template-columns: repeat(4,1fr) !important; } }

      /* Admin tabs scrollable */
      .admin-tabs-bar { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .admin-tabs-bar::-webkit-scrollbar { display: none; }

      /* Action pills scrollable */
      .pills-scroll { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-wrap: nowrap; padding: 0 14px 12px; }
      .pills-scroll::-webkit-scrollbar { display: none; }

      /* Timeline columns */
      .timeline-row { display: grid; grid-template-columns: 58px 1fr 58px; }
      @media (max-width: 360px) { .timeline-row { grid-template-columns: 40px 1fr 40px !important; } }

      /* Driver map */
      .driver-map-wrap { height: min(420px, 55vw); min-height: 220px; }
      .driver-map-wrap .leaflet-container { height: 100% !important; }

      /* Track map */
      .track-map-wrap { height: calc(100svh - 120px); min-height: 300px; }
      .track-map-wrap .leaflet-container { height: 100% !important; }

      /* Sticky bottom */
      .sticky-bar { position: -webkit-sticky; position: sticky; bottom: 0; }

      /* Leaflet */
      .leaflet-container { width: 100%; }
    </style>

    <title>Where Is My Bus 🚌</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
